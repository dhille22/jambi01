name: jambi01
description: Aplikasi crowdsourcing pengaduan kerusakan fasilitas umum Kota Jambi berbasis klasifikasi citra dan Supabase.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.2
  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  flutter_riverpod: ^2.6.1
  flutter_spinkit: ^5.2.2
  image: ^4.5.4
  latlong2: ^0.9.1
  location: ^8.0.1
  path_provider: ^2.1.5
  tflite_flutter: ^0.11.0
  uuid: ^4.5.1
  supabase_flutter: ^2.12.4
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/bgg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/labels/
    - assets/models/
